<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="card premium-card">
        <h2>Register</h2>
        <div class="hero-divider"></div>
        
        <label>Full Name</label>
        <input type="text" id="reg_name" placeholder="Enter your name">
        
        <label>Email Address</label>
        <input type="email" id="reg_email" placeholder="email@example.com">
        
        <label>Password</label>
        <input type="password" id="reg_password" placeholder="••••••••">
        
        <button class="action-btn" onclick="register()">Create Account</button>
        
        <p style="margin-top:15px;">
            Already a member? <a href="login.html" style="color: #c99169;">Sign In</a>
        </p>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
